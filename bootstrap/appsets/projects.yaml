# Sinh 1 Application cho mỗi (project, app, env).
#   Trục 1 (list)  : project = branch     -> branch-based
#   Trục 2 (git)   : env     = directory  -> directory-based
# Mỗi Application là multi-source, CẢ HAI source đều là repo này, CÙNG revision = branch project
# (ArgoCD không cho $values trỏ khác revision của cùng 1 repo):
#   source[0] = base Helm chart helm-charts/app (bản copy trên branch project, đồng bộ từ main)
#   source[1] = values theo env trên branch project ($values)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: all-projects
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # --- Trục project (branch-based) ---
          - list:
              elements:
                - project: mention-mate
                  branch: project-mention-mate
                - project: birdnet-market
                  branch: project-birdnet-market
          # --- Trục env (directory-based): mỗi folder overlay = 1 env ---
          - git:
              repoURL: https://github.com/ongtungduong/gitops-training.git
              revision: '{{.branch}}'
              directories:
                - path: "apps/*/overlays/*"
  template:
    metadata:
      # path.segments[1] = tên app ; path.basename = tên env
      name: '{{.project}}-{{ index .path.segments 1 }}-{{.path.basename}}'
      labels:
        project: '{{.project}}'
        app: '{{ index .path.segments 1 }}'
        env: '{{.path.basename}}'
    spec:
      project: '{{.project}}'
      sources:
        # base = chart helm-charts/app trên CHÍNH branch project (cùng revision với values)
        - repoURL: https://github.com/ongtungduong/gitops-training.git
          targetRevision: '{{.branch}}'
          path: 'helm-charts/app'
          helm:
            valueFiles:
              - '$values/{{.path.path}}/values.yaml'
        # values theo env, nằm trong branch của project
        - repoURL: https://github.com/ongtungduong/gitops-training.git
          targetRevision: '{{.branch}}'
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.project}}-{{.path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
